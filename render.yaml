services:
  # Backend Service (serves both API and frontend)
  - type: web
    name: lifevault-api
    env: node
    repo: https://github.com/patankaif/LifeVault.git
    rootDir: .
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Email Service (Resend Production)
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@lifevaults.me
      - key: FROM_NAME
        value: LifeVault
      # Database
      - key: MONGODB_URI
        sync: false
      # JWT & Auth
      - key: JWT_SECRET
        sync: false
      # OAuth - Google
      - key: OAUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: OAUTH_GOOGLE_CLIENT_SECRET
        sync: false
      # OAuth - Facebook  
      - key: OAUTH_FACEBOOK_CLIENT_ID
        sync: false
      - key: OAUTH_FACEBOOK_CLIENT_SECRET
        sync: false
      # Email Service
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      # URLs
      - key: FRONTEND_URL
        value: https://lifevault-frontend.onrender.com
      # Analytics
      - key: VITE_ANALYTICS_ENDPOINT
        value: https://lifevault-api.onrender.com
      - key: VITE_ANALYTICS_WEBSITE_ID
        value: prod
      # File Upload
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: UPLOAD_DIR
        value: ./uploads

  # No separate frontend service needed - backend serves both API and frontend

# No database service needed - using external MongoDB
